# =============================================================================
# Nginx Security Headers
#
# Repository: wsd-web-infrastructure-security
# Maintained as part of Web Stack Defense — https://www.webstackdefense.com
#
# Server-level HTTP security headers for Nginx. These headers reduce the
# impact of common client-side attacks (XSS, clickjacking, MIME confusion,
# information leakage).
#
# Place this file in /etc/nginx/snippets/security-headers.conf and include
# from server { } blocks:
#
#   include snippets/security-headers.conf;
#
# Notes on header behavior:
#
#   - The "always" parameter ensures headers are added on error responses
#     too (4xx, 5xx), not only on 2xx.
#   - Some plugins or applications may set their own headers that override
#     these. If a header does not appear in the response, check the
#     application layer.
#   - Content-Security-Policy is the most powerful header here and the
#     hardest to get right. It is included as a commented strict starter
#     example. Tune it carefully — a wrong CSP breaks the site.
#
# Reference: https://owasp.org/www-project-secure-headers/
# Reference: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers
# =============================================================================


# -----------------------------------------------------------------------------
# 1. X-Content-Type-Options
# -----------------------------------------------------------------------------
# Prevents browsers from MIME-sniffing the response away from the declared
# Content-Type. Mitigates a class of attacks where, for example, a server
# returns a script as text/plain and the browser executes it because the
# content "looks like" JavaScript.
#
# Always set to "nosniff". There is no reason not to.
# -----------------------------------------------------------------------------

add_header X-Content-Type-Options "nosniff" always;


# -----------------------------------------------------------------------------
# 2. X-Frame-Options
# -----------------------------------------------------------------------------
# Controls whether the page can be embedded in an iframe. Mitigates
# clickjacking attacks.
#
# Values:
#   DENY                 - No iframe embedding at all (strictest)
#   SAMEORIGIN           - Allow embedding only from the same origin
#   ALLOW-FROM <uri>     - Deprecated, replaced by frame-ancestors in CSP
#
# SAMEORIGIN is the safe default for most sites. If your site is never
# embedded anywhere, use DENY. If your site is embedded by partners, use
# the frame-ancestors directive in Content-Security-Policy instead and
# remove this header.
# -----------------------------------------------------------------------------

add_header X-Frame-Options "SAMEORIGIN" always;


# -----------------------------------------------------------------------------
# 3. Referrer-Policy
# -----------------------------------------------------------------------------
# Controls how much referrer information is sent with outbound requests.
# Reduces information leakage to third-party sites.
#
# Common values:
#   no-referrer                       - Never send Referer
#   no-referrer-when-downgrade        - Send for HTTPS→HTTPS, not HTTPS→HTTP
#   same-origin                       - Send Referer only to same origin
#   strict-origin                     - Send only origin (no path) to same-origin and HTTPS
#   strict-origin-when-cross-origin   - Full Referer same-origin, origin only cross-origin
#
# "strict-origin-when-cross-origin" is the modern browser default and a
# reasonable balance between privacy and functionality.
# -----------------------------------------------------------------------------

add_header Referrer-Policy "strict-origin-when-cross-origin" always;


# -----------------------------------------------------------------------------
# 4. Permissions-Policy
# -----------------------------------------------------------------------------
# Successor to Feature-Policy. Restricts which browser features the page
# (and embedded iframes) can use.
#
# The example below disables several powerful features that most websites
# do not need. Adjust based on the site's actual functionality.
#
# Common features to control:
#   geolocation     - GPS location access
#   microphone      - Audio capture
#   camera          - Video capture
#   payment         - Payment Request API
#   usb             - WebUSB
#   fullscreen      - Fullscreen API
#   accelerometer   - Motion sensors
#   gyroscope       - Motion sensors
#   magnetometer    - Compass
# -----------------------------------------------------------------------------

add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;


# -----------------------------------------------------------------------------
# 5. Cross-Origin headers (commented — site-specific)
# -----------------------------------------------------------------------------
# These three headers control cross-origin resource sharing in detail.
# Enabling them improperly can break embeds, third-party scripts, and
# analytics. Test carefully.
#
# Cross-Origin-Opener-Policy isolates the browsing context from
# cross-origin documents. "same-origin" gives Spectre-class isolation.
#
# Cross-Origin-Embedder-Policy requires explicit opt-in from cross-origin
# resources. "require-corp" is the strict mode.
#
# Cross-Origin-Resource-Policy controls whether the resource can be
# loaded by cross-origin requests.
# -----------------------------------------------------------------------------

# add_header Cross-Origin-Opener-Policy "same-origin" always;
# add_header Cross-Origin-Embedder-Policy "require-corp" always;
# add_header Cross-Origin-Resource-Policy "same-origin" always;


# -----------------------------------------------------------------------------
# 6. Content-Security-Policy (commented — REQUIRES TUNING)
# -----------------------------------------------------------------------------
# CSP restricts which sources the browser will load resources from
# (scripts, styles, fonts, images, etc.). It is the most powerful header
# in this file and the hardest to get right.
#
# Wrong CSP breaks the site. A typical first deployment uses Report-Only
# mode, which logs violations without enforcing them. Review the reports,
# tune the policy, then switch to enforcement.
#
# Example starter policy for a typical WordPress or marketing site:
#
#   default-src 'self';
#   script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com;
#   style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
#   font-src 'self' https://fonts.gstatic.com data:;
#   img-src 'self' data: https:;
#   connect-src 'self' https://www.google-analytics.com;
#   frame-ancestors 'self';
#   base-uri 'self';
#   form-action 'self';
#
# Note that 'unsafe-inline' for scripts and styles defeats much of the
# protection CSP provides. The right long-term answer is nonces or hashes
# rather than 'unsafe-inline', but those require coordination with the
# application layer.
#
# Use Content-Security-Policy-Report-Only first to test without breaking
# the site. Switch to Content-Security-Policy only after the reports are
# clean.
#
# Reference: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy
# Reference: https://csp-evaluator.withgoogle.com/
# -----------------------------------------------------------------------------

# add_header Content-Security-Policy-Report-Only "default-src 'self'; report-uri /csp-report-endpoint" always;
# add_header Content-Security-Policy "default-src 'self'" always;


# -----------------------------------------------------------------------------
# 7. Server identification suppression
# -----------------------------------------------------------------------------
# Removes the Server header version disclosure. Set in the main nginx.conf
# under the http { } block, not here.
#
# In nginx.conf, http { } block:
#   server_tokens off;
# -----------------------------------------------------------------------------


# -----------------------------------------------------------------------------
# 8. Headers Nginx removes from responses (commented)
# -----------------------------------------------------------------------------
# Some upstream applications (PHP-FPM, app servers) set headers that
# disclose version information. These can be stripped via the
# proxy_hide_header directive (for proxied responses) or fastcgi_hide_header
# (for FastCGI responses).
#
# Place these in the appropriate location { } block:
#
#   fastcgi_hide_header X-Powered-By;
#   proxy_hide_header X-Powered-By;
#
# Or use the more_clear_headers directive if you have the headers-more
# module compiled in:
#
#   more_clear_headers 'X-Powered-By';
#   more_clear_headers 'Server';
# -----------------------------------------------------------------------------


# -----------------------------------------------------------------------------
# Validation
# -----------------------------------------------------------------------------
# After applying these headers:
#
#   1. Test Nginx syntax: sudo nginx -t
#   2. Reload Nginx:      sudo systemctl reload nginx
#   3. Test response headers with curl:
#        curl -sI https://example.com | sort
#   4. Run a free external scan:
#        https://securityheaders.com/
#        https://observatory.mozilla.org/
#
# The external scanners give grades. Aim for B+ or higher. A+ requires
# Content-Security-Policy, which requires tuning. Do not chase A+ at the
# cost of breaking the site.
# -----------------------------------------------------------------------------
