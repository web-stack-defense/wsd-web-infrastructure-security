# =============================================================================
# Apache Security Headers
#
# Repository: wsd-web-infrastructure-security
# Maintained as part of Web Stack Defense — https://www.webstackdefense.com
#
# Server-level HTTP security headers for Apache. These headers reduce the
# impact of common client-side attacks (XSS, clickjacking, MIME confusion,
# information leakage).
#
# Place this file in /etc/apache2/conf-available/security-headers.conf and
# enable with:
#
#   sudo a2enconf security-headers
#   sudo a2enmod headers
#   sudo systemctl reload apache2
#
# All directives require mod_headers (a2enmod headers).
#
# See nginx-security-headers.conf in this directory for the full rationale
# on each header. Comments below are abbreviated; refer to the Nginx file
# for detailed explanations of header values and tradeoffs.
#
# Reference: https://owasp.org/www-project-secure-headers/
# Reference: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers
# =============================================================================


<IfModule mod_headers.c>

    # -------------------------------------------------------------------------
    # 1. X-Content-Type-Options
    # -------------------------------------------------------------------------
    # Prevents MIME type sniffing. Always set to "nosniff".
    # -------------------------------------------------------------------------

    Header always set X-Content-Type-Options "nosniff"


    # -------------------------------------------------------------------------
    # 2. X-Frame-Options
    # -------------------------------------------------------------------------
    # Controls iframe embedding. SAMEORIGIN is the safe default.
    # -------------------------------------------------------------------------

    Header always set X-Frame-Options "SAMEORIGIN"


    # -------------------------------------------------------------------------
    # 3. Referrer-Policy
    # -------------------------------------------------------------------------
    # Controls Referer header on outbound requests.
    # -------------------------------------------------------------------------

    Header always set Referrer-Policy "strict-origin-when-cross-origin"


    # -------------------------------------------------------------------------
    # 4. Permissions-Policy
    # -------------------------------------------------------------------------
    # Restricts powerful browser features. Adjust the empty parentheses
    # values to a list of allowed origins if the feature IS needed:
    #   Header always set Permissions-Policy "camera=(self), microphone=()"
    # -------------------------------------------------------------------------

    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()"


    # -------------------------------------------------------------------------
    # 5. Cross-Origin headers (commented — site-specific)
    # -------------------------------------------------------------------------

    # Header always set Cross-Origin-Opener-Policy "same-origin"
    # Header always set Cross-Origin-Embedder-Policy "require-corp"
    # Header always set Cross-Origin-Resource-Policy "same-origin"


    # -------------------------------------------------------------------------
    # 6. Content-Security-Policy (commented — REQUIRES TUNING)
    # -------------------------------------------------------------------------
    # Start with Report-Only mode. See the Nginx headers file for a
    # complete starter policy template.
    # -------------------------------------------------------------------------

    # Header always set Content-Security-Policy-Report-Only "default-src 'self'; report-uri /csp-report-endpoint"


    # -------------------------------------------------------------------------
    # 7. Suppress X-Powered-By from PHP and other backends
    # -------------------------------------------------------------------------
    # If the application sets an X-Powered-By header (PHP does this by
    # default), strip it from responses. This is reconnaissance hygiene,
    # not a serious control.
    #
    # The unset directive removes the header if it was set upstream.
    # -------------------------------------------------------------------------

    Header always unset X-Powered-By
    Header unset X-Powered-By

</IfModule>


# -----------------------------------------------------------------------------
# 8. Server identification suppression
# -----------------------------------------------------------------------------
# Suppress Apache version info in the Server header and error pages.
# These directives must be set at the server (global) level, in
# /etc/apache2/apache2.conf or /etc/apache2/conf-enabled/security.conf,
# not inside an <IfModule>:
#
#   ServerTokens Prod
#   ServerSignature Off
#
# Apache cannot strip the Server header entirely without recompilation,
# but ServerTokens Prod reduces it to "Server: Apache" with no version.
# -----------------------------------------------------------------------------


# -----------------------------------------------------------------------------
# Validation
# -----------------------------------------------------------------------------
# After applying these headers:
#
#   1. Test Apache syntax: sudo apache2ctl configtest
#   2. Reload Apache:      sudo systemctl reload apache2
#   3. Test response headers with curl:
#        curl -sI https://example.com | sort
#   4. Run a free external scan:
#        https://securityheaders.com/
#        https://observatory.mozilla.org/
#
# Aim for B+ or higher. A+ requires Content-Security-Policy, which
# requires tuning. Do not chase A+ at the cost of breaking the site.
# -----------------------------------------------------------------------------
