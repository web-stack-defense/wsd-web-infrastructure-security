# =============================================================================
# Apache TLS Configuration — Mozilla Intermediate Profile
#
# Repository: wsd-web-infrastructure-security
# Maintained as part of Web Stack Defense — https://www.webstackdefense.com
#
# This file provides TLS configuration directives aligned to the Mozilla
# Server Side TLS Intermediate profile (guideline v5.8, October 2025).
#
# v5.8 important change: kDHE (DHE-RSA) cipher suites were removed from
# the Intermediate recommendation.
#
# Reference: https://ssl-config.mozilla.org/
# Reference: https://wiki.mozilla.org/Security/Server_Side_TLS
#
# This is meant to be included from a <VirtualHost> block, or saved as
# /etc/apache2/conf-available/tls-intermediate.conf and enabled with:
#
#   sudo a2enconf tls-intermediate
#
# Requirements:
#   - Apache 2.4.x
#   - mod_ssl
#   - OpenSSL 1.1.1 or newer (1.1.1 minimum for TLS 1.3)
#   - mod_headers (for HSTS, see section 8)
#
# Tested against:
#   - Apache 2.4.52, 2.4.58
#   - OpenSSL 3.0.x, 3.2.x
# =============================================================================


# -----------------------------------------------------------------------------
# 1. Protocol versions
# -----------------------------------------------------------------------------
# TLS 1.2 and TLS 1.3 only. The "-all +TLSv1.2 +TLSv1.3" pattern is a
# whitelist: disable everything, then explicitly enable the two protocols
# we want. This is safer than enabling-then-disabling because it does not
# implicitly enable future protocols that might be problematic.
# -----------------------------------------------------------------------------

SSLProtocol -all +TLSv1.2 +TLSv1.3


# -----------------------------------------------------------------------------
# 2. Cipher suites (TLS 1.2)
# -----------------------------------------------------------------------------
# All ECDHE-RSA / ECDHE-ECDSA with AEAD modes (GCM and CHACHA20-POLY1305).
# No DHE (removed in Mozilla guideline v5.8). No CBC modes.
#
# Apache uses SSLCipherSuite for TLS 1.2. TLS 1.3 cipher suites are
# controlled by OpenSSL and use SSLCipherSuite TLSv1.3 in newer Apache
# versions, but the defaults are appropriate without explicit configuration.
# -----------------------------------------------------------------------------

SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305


# -----------------------------------------------------------------------------
# 3. Cipher ordering
# -----------------------------------------------------------------------------
# With Mozilla Intermediate, all listed ciphers are strong. Let the client
# pick based on its hardware capabilities.
# -----------------------------------------------------------------------------

SSLHonorCipherOrder off


# -----------------------------------------------------------------------------
# 4. Session handling
# -----------------------------------------------------------------------------
# Session tickets disabled because Apache does not automatically rotate
# the ticket encryption key. With session tickets off, perfect forward
# secrecy is preserved.
#
# Note: SSLSessionTickets directive was added in Apache 2.4.11. Earlier
# versions ignore this directive.
# -----------------------------------------------------------------------------

SSLSessionTickets off

# Session cache. The shared memory cache improves handshake performance
# for returning clients.
SSLSessionCache shmcb:/var/cache/mod_ssl/scache(512000)
SSLSessionCacheTimeout 86400


# -----------------------------------------------------------------------------
# 5. OCSP stapling
# -----------------------------------------------------------------------------
# OCSP stapling configuration. The stapling cache must be configured at
# the server (global) level, not per-VirtualHost. The line below MUST be
# placed in the main Apache configuration, not inside a VirtualHost:
#
#   SSLStaplingCache shmcb:/var/run/ocsp(128000)
#
# The directives below can be placed in a VirtualHost.
#
# Important: OCSP stapling does NOT work with most Let's Encrypt
# certificates issued after 2024 because Let's Encrypt deprecated OCSP
# responder URLs in their certificates. For Let's Encrypt certificates
# issued without an OCSP responder URL, stapling silently does nothing.
# -----------------------------------------------------------------------------

SSLUseStapling on
SSLStaplingResponderTimeout 5
SSLStaplingReturnResponderErrors off


# -----------------------------------------------------------------------------
# 6. Compression
# -----------------------------------------------------------------------------
# Disable SSL compression to prevent CRIME-class attacks. Most Apache
# builds disable SSL compression by default in modern versions, but this
# directive enforces it explicitly.
# -----------------------------------------------------------------------------

SSLCompression off


# -----------------------------------------------------------------------------
# 7. Certificate paths
# -----------------------------------------------------------------------------
# Certificate file paths. These two directives must be set in your
# <VirtualHost> block. The example values below are commented:
#
# SSLCertificateFile      /etc/letsencrypt/live/example.com/fullchain.pem
# SSLCertificateKeyFile   /etc/letsencrypt/live/example.com/privkey.pem
#
# For older Apache versions that require an explicit chain file:
# SSLCertificateChainFile /etc/letsencrypt/live/example.com/chain.pem
# -----------------------------------------------------------------------------


# -----------------------------------------------------------------------------
# 8. HSTS (commented — enable only after confirming HTTPS works)
# -----------------------------------------------------------------------------
# Requires mod_headers (sudo a2enmod headers).
#
# CRITICAL DEPLOYMENT NOTES:
#   1. Enable ONLY after confirming HTTPS works correctly on all paths
#   2. Start with a low max-age (300 seconds = 5 minutes) for testing
#   3. Increase to 31536000 (1 year) only after a few days of clean operation
#   4. Adding "preload" submits the domain for inclusion in browser preload
#      lists, which is essentially irreversible.
#
# Reference: https://hstspreload.org/
# -----------------------------------------------------------------------------

# Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
# Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"


# -----------------------------------------------------------------------------
# 9. HTTP to HTTPS redirect (example)
# -----------------------------------------------------------------------------
# Place this in a separate <VirtualHost *:80> block:
#
# <VirtualHost *:80>
#     ServerName example.com
#     ServerAlias www.example.com
#
#     # Allow Let's Encrypt ACME challenge over plain HTTP
#     Alias /.well-known/acme-challenge/ /var/www/html/.well-known/acme-challenge/
#     <Directory "/var/www/html/.well-known/acme-challenge/">
#         Options None
#         AllowOverride None
#         Require all granted
#     </Directory>
#
#     # Redirect everything else to HTTPS
#     RewriteEngine On
#     RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
#     RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
# </VirtualHost>
# -----------------------------------------------------------------------------
