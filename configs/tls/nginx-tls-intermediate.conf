# =============================================================================
# Nginx TLS Configuration — Mozilla Intermediate Profile
#
# Repository: wsd-web-infrastructure-security
# Maintained as part of Web Stack Defense — https://www.webstackdefense.com
#
# This file provides TLS configuration directives aligned to the Mozilla
# Server Side TLS Intermediate profile (guideline v5.8, October 2025).
#
# v5.8 important change: kDHE (DHE-RSA) cipher suites were removed from
# the Intermediate recommendation. The Intermediate TLS 1.2 ciphers are
# now ECDHE-only with AEAD modes.
#
# Reference: https://ssl-config.mozilla.org/
# Reference: https://wiki.mozilla.org/Security/Server_Side_TLS
#
# This is meant to be included from a server { } block, or saved as
# /etc/nginx/snippets/tls-intermediate.conf and included where needed:
#
#   include snippets/tls-intermediate.conf;
#
# Requirements:
#   - Nginx 1.13.0 or newer (for TLS 1.3 support; 1.20+ recommended)
#   - OpenSSL 1.1.1 or newer (1.1.1 minimum for TLS 1.3)
#   - Valid TLS certificate
#
# Tested against:
#   - Nginx 1.22.x, 1.24.x
#   - OpenSSL 3.0.x, 3.2.x
# =============================================================================


# -----------------------------------------------------------------------------
# 1. Protocol versions
# -----------------------------------------------------------------------------
# TLS 1.2 and TLS 1.3 only. TLS 1.0 and 1.1 are deprecated and should not
# be enabled on any public-facing server in 2026.
#
# To support TLS 1.3 only (Modern profile), remove TLSv1.2 from this line.
# Modern excludes any client that does not speak TLS 1.3 — this rules out
# older mobile devices, some embedded clients, and any legacy integration.
# -----------------------------------------------------------------------------

ssl_protocols TLSv1.2 TLSv1.3;


# -----------------------------------------------------------------------------
# 2. Cipher suites (TLS 1.2)
# -----------------------------------------------------------------------------
# All ECDHE-RSA / ECDHE-ECDSA with AEAD modes (GCM and CHACHA20-POLY1305).
# No DHE (removed in Mozilla guideline v5.8). No CBC modes.
#
# TLS 1.3 cipher suites are configured by OpenSSL itself and cannot be
# changed via Nginx directives in TLS 1.3 — only TLS 1.2 ciphers go here.
# -----------------------------------------------------------------------------

ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;


# -----------------------------------------------------------------------------
# 3. Cipher ordering
# -----------------------------------------------------------------------------
# With Mozilla Intermediate, all listed ciphers are strong. Let the client
# pick — clients know best whether they have AES hardware acceleration
# (preference for AES-GCM) or not (preference for CHACHA20-POLY1305).
#
# Some external scanners (Qualys SSL Labs, Gixy) flag `ssl_prefer_server_ciphers off`
# as a warning. With Mozilla's curated cipher list, this warning can be
# safely ignored. The warning applies to lists that contain weak ciphers,
# where the client picking a weak option would be a problem.
# -----------------------------------------------------------------------------

ssl_prefer_server_ciphers off;


# -----------------------------------------------------------------------------
# 4. ECDH curves
# -----------------------------------------------------------------------------
# Curves used for ECDHE key exchange. X25519 is preferred by modern
# clients. prime256v1 (P-256) and secp384r1 (P-384) are included for
# compatibility.
# -----------------------------------------------------------------------------

ssl_ecdh_curve X25519:prime256v1:secp384r1;


# -----------------------------------------------------------------------------
# 5. Session handling
# -----------------------------------------------------------------------------
# Session cache reduces TLS handshake overhead for returning clients.
# Session tickets are disabled because their security depends on rotating
# the ticket encryption key, which Nginx does not do automatically. With
# session tickets off, perfect forward secrecy is preserved at the cost
# of higher CPU on returning connections.
# -----------------------------------------------------------------------------

ssl_session_timeout 1d;
ssl_session_cache shared:WebSSL:50m;
ssl_session_tickets off;


# -----------------------------------------------------------------------------
# 6. OCSP stapling
# -----------------------------------------------------------------------------
# OCSP stapling allows the server to provide a signed OCSP response with
# every handshake, removing the need for clients to make a separate OCSP
# request. This improves both performance and privacy.
#
# Important: OCSP stapling does NOT work with most Let's Encrypt
# certificates issued after 2024 because Let's Encrypt deprecated OCSP
# responder URLs in their certificates. For Let's Encrypt certificates
# issued without an OCSP responder URL, stapling silently does nothing
# (it does not break the configuration).
#
# Commercial CAs that still issue certificates with OCSP responder URLs
# benefit from this configuration.
# -----------------------------------------------------------------------------

ssl_stapling on;
ssl_stapling_verify on;

# DNS resolver used by Nginx to look up OCSP responder URLs.
# 127.0.0.53 is the systemd-resolved stub resolver (Ubuntu default).
# Adjust if your server uses a different resolver.
resolver 127.0.0.53 valid=300s;
resolver_timeout 5s;


# -----------------------------------------------------------------------------
# 7. Certificate paths
# -----------------------------------------------------------------------------
# Certificate file paths. The two lines below are commented because the
# correct paths are site-specific. Set these in your server { } block:
#
# ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
# ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
# -----------------------------------------------------------------------------


# -----------------------------------------------------------------------------
# 8. HSTS (commented — enable only after confirming HTTPS works)
# -----------------------------------------------------------------------------
# HTTP Strict Transport Security tells browsers to access this domain over
# HTTPS only for the duration of max-age. Once a browser caches HSTS, it
# refuses plain HTTP for this domain even if the user explicitly types
# http:// — recovery requires the user to clear browser data.
#
# CRITICAL DEPLOYMENT NOTES:
#   1. Enable ONLY after confirming HTTPS works correctly on all paths
#   2. Start with a low max-age (300 seconds = 5 minutes) for testing
#   3. Increase to 31536000 (1 year) only after a few days of clean operation
#   4. Adding "preload" submits the domain for inclusion in browser preload
#      lists, which is essentially irreversible. Do not add "preload" unless
#      you are committed to permanent HTTPS for the domain and all subdomains.
#
# Reference: https://hstspreload.org/
# -----------------------------------------------------------------------------

# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;


# -----------------------------------------------------------------------------
# 9. HTTP to HTTPS redirect (example)
# -----------------------------------------------------------------------------
# Place this in a separate server block. Not included as a directive here
# because it requires its own server { } block.
#
# server {
#     listen 80;
#     listen [::]:80;
#     server_name example.com www.example.com;
#
#     # Allow Let's Encrypt ACME challenge over plain HTTP
#     location /.well-known/acme-challenge/ {
#         root /var/www/html;
#     }
#
#     # Redirect everything else to HTTPS
#     location / {
#         return 301 https://$host$request_uri;
#     }
# }
# -----------------------------------------------------------------------------
